name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'tests/**.py'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: clean-evening-499803-c3
  GCP_PROJECT_NUMBER: "650265798232"
  GCP_BUCKET: clean-evening-499803-c3-day21-track2-2a202600622
  GCP_SERVICE_ACCOUNT: mlops-lab-sa@clean-evening-499803-c3.iam.gserviceaccount.com
  GCP_WIF_PROVIDER: projects/650265798232/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: |
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          export MLFLOW_ARTIFACT_ROOT=./mlartifacts
          python src/train.py
        shell: bash

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json', encoding='utf-8'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-artifact
          path: |
            outputs/metrics.json
            outputs/report.txt

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: models/model.pkl

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install evaluation dependency
        run: pip install google-cloud-storage

      - name: Download outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: outputs-artifact
          path: artifact_outputs

      - name: Download previous production metrics
        run: |
          python - <<'EOF'
          from google.cloud import storage
          from google.api_core.exceptions import NotFound

          client = storage.Client(project="${{ env.GCP_PROJECT_ID }}")
          bucket = client.bucket("${{ env.GCP_BUCKET }}")
          blob = bucket.blob("models/latest/metrics.json")
          try:
              blob.download_to_filename("previous_metrics.json")
              print("Downloaded previous production metrics.")
          except NotFound:
              print("No previous production metrics found. First deploy will be allowed.")
          EOF

      - name: Check eval gate and rollback protection
        run: |
          python - <<'EOF'
          import json
          import os

          with open("artifact_outputs/metrics.json", encoding="utf-8") as f:
              current = json.load(f)

          acc = float(current["accuracy"])
          threshold = 0.70
          if acc < threshold:
              raise SystemExit(
                  f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy."
              )

          previous_path = "previous_metrics.json"
          if os.path.exists(previous_path):
              with open(previous_path, encoding="utf-8") as f:
                  previous = json.load(f)
              previous_acc = float(previous["accuracy"])
              if acc < previous_acc:
                  raise SystemExit(
                      f"FAILED: accuracy moi {acc:.4f} < accuracy dang chay {previous_acc:.4f}. Huy deploy."
                  )
              print(
                  f"PASSED: accuracy moi {acc:.4f} >= accuracy dang chay {previous_acc:.4f}."
              )
          else:
              print(f"PASSED: khong co model cu. Accuracy hien tai {acc:.4f} dat nguong.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install deploy dependency
        run: pip install google-cloud-storage

      - name: Download outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: outputs-artifact
          path: artifact_outputs

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifact
          path: artifact_model

      - name: Upload approved model and metrics to Cloud Storage
        run: |
          python - <<'EOF'
          from google.cloud import storage

          client = storage.Client(project="${{ env.GCP_PROJECT_ID }}")
          bucket = client.bucket("${{ env.GCP_BUCKET }}")

          bucket.blob("models/latest/model.pkl").upload_from_filename("artifact_model/model.pkl")
          bucket.blob("models/latest/metrics.json").upload_from_filename("artifact_outputs/metrics.json")
          bucket.blob("models/latest/report.txt").upload_from_filename("artifact_outputs/report.txt")
          print("Uploaded approved model, metrics, and report to Cloud Storage.")
          EOF

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 8
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed after restart."
            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
